    - macro: '{$ARCOND.IP}'
      value: 192.168.20.231
      description: IP do controlador Modbus TCP.
    - macro: '{$ARCOND.PORT}'
      value: '502'
      description: Porta Modbus TCP.
    - macro: '{$ARCOND.UNIT}'
      value: '1'
      description: Unit ID / Slave ID Modbus.
    - macro: '{$ARCOND.TIMEOUT}'
      value: '3'
      description: Timeout do script externo em segundos.
    - macro: '{$ARCOND.NODATA}'
      value: 5m
      description: Tempo sem dados para acionar trigger de indisponibilidade.
    - macro: '{$ARCOND.TEMP.WARN}'
      value: '43'
      description: Temperatura de aviso. Default igual ao ponto de liga refrigeração visto em campo.
    - macro: '{$ARCOND.TEMP.WARN.TIME}'
      value: 5m
      description: Persistência para aviso de temperatura.
    - macro: '{$ARCOND.TEMP.HIGH}'
      value: '50'
      description: Temperatura alta antes do alarme crítico do controlador.
    - macro: '{$ARCOND.TEMP.HIGH.TIME}'
      value: 5m
      description: Persistência para temperatura alta.
    - macro: '{$ARCOND.COOLING.START.MARGIN}'
      value: '0.5'
      description: Margem acima do ponto de liga refrigeração para detectar compressor não acionando.
    - macro: '{$ARCOND.COOLING.STOP.MARGIN}'
      value: '1'
      description: Margem acima do ponto de desliga refrigeração para detectar refrigeração ineficiente.
    - macro: '{$ARCOND.COOLING.CHECK.TIME}'
      value: 10m
      description: Janela para avaliar refrigeração ineficiente.
    - macro: '{$ARCOND.ALERT.MACHINE_OFF}'
      value: '1'
      description: 1 alerta se máquina/sistema estiver desligado; 0 desativa esse alerta.
    - macro: '{$ARCOND.ALERT.FORCE_MODE}'
      value: '0'
      description: 1 alerta quando algum modo estiver forçado; 0 não alerta. O default 0 evita ruído quando ventilador interno é propositalmente force_on.
