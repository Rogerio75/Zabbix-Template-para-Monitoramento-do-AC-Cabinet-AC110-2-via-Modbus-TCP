zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: e49af024063147e69c223711651e1e30
    name: Templates/BSR
  templates:
  - uuid: 1e6931f1c5b34ec3b4e6f706c4eaacdf
    template: Template_AC_Cabinet_ZL_U09D2_SL_JSON
    name: Template AC Cabinet ZL-U09D2-SL JSON Melhorado
    description: 'Template melhorado para ar-condicionado de gabinete AC110-2 / controlador ZL-U09D2-SL.

      Usa item mestre JSON via external check e itens dependentes. O script esperado no diretório externalscripts é ar_condicionado_modbus, sem extensão Python.

      Mapeamento validado com os dados reais coletados: refrigeração liga em reg[8]/tabela 009 e desliga em reg[9]/tabela 010.

      Compatível com Zabbix 7.0.x. Ajuste as macros {$ARCOND.IP}, {$ARCOND.PORT}, {$ARCOND.UNIT} e {$ARCOND.TIMEOUT} no host.'
    groups:
    - name: Templates/BSR
    items:
    - uuid: 450df162cda048bd89807bfabf1ea58f
      name: AC Cabinet JSON
      type: EXTERNAL
      key: ar_condicionado_modbus["--ip","{$ARCOND.IP}","--port","{$ARCOND.PORT}","--unit","{$ARCOND.UNIT}","--timeout","{$ARCOND.TIMEOUT}"]
      delay: 1m
      history: 7d
      value_type: TEXT
      trends: '0'
      description: Item mestre. Executa o script externo ar_condicionado_modbus e recebe um JSON com holding registers e coils do controlador ZL-U09D2-SL.
      tags:
      - tag: component
        value: raw
    - uuid: da34c3559edc4051a5bb7042d660dd54
      name: AC Status da coleta
      type: DEPENDENT
      key: arcond.status
      delay: '0'
      history: 30d
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.status
      master_item:
        key: ar_condicionado_modbus["--ip","{$ARCOND.IP}","--port","{$ARCOND.PORT}","--unit","{$ARCOND.UNIT}","--timeout","{$ARCOND.TIMEOUT}"]
      tags:
      - tag: component
        value: availability
      value_type: TEXT
      trends: '0'
      description: 'status retornado pelo script: ok ou error.'
    - uuid: 5ec0cc2c583f4eddbe86173ba9605acf
